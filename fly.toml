app = "自己填一个唯一名字，比如 my-note-api-123"
primary_region = "sin"  # 新加坡，国内最快
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  builder = "gcr.io/buildpacks/builder:v1"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[mounts]
  source = "data"
  destination = "/data"  # SQLite 数据库存在这里，永久保存