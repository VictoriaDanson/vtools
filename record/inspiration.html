<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日灵感</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h1>每日灵感</h1>

      <div class="input-section">
        <textarea id="input" placeholder="记录此刻的灵感..."></textarea>
        <div class="btn-row">
          <button id="submitBtn">记录</button>
        </div>
      </div>

      <div class="list-section">
        <div class="list-title">历史记录</div>
        <div id="list"></div>
      </div>
    </div>

    <script>
      const input = document.getElementById('input')
      const submitBtn = document.getElementById('submitBtn')
      const list = document.getElementById('list')

      // 从 localStorage 加载数据
      function loadItems() {
        const data = localStorage.getItem('inspirations')
        return data ? JSON.parse(data) : []
      }

      // 保存到 localStorage
      function saveItems(items) {
        localStorage.setItem('inspirations', JSON.stringify(items))
      }

      // 格式化日期
      function formatDate(timestamp) {
        const date = new Date(timestamp)
        const y = date.getFullYear()
        const m = String(date.getMonth() + 1).padStart(2, '0')
        const d = String(date.getDate()).padStart(2, '0')
        const h = String(date.getHours()).padStart(2, '0')
        const min = String(date.getMinutes()).padStart(2, '0')
        return `${y}-${m}-${d} ${h}:${min}`
      }

      // 渲染列表
      function render() {
        const items = loadItems()

        if (items.length === 0) {
          list.innerHTML =
            '<div class="empty-tip">暂无记录，写下你的第一个灵感吧</div>'
          return
        }

        list.innerHTML = items
          .map(
            (item, index) => `
                <div class="item">
                    <span class="item-delete" onclick="deleteItem(${index})">删除</span>
                    <div class="item-date">${formatDate(item.time)}</div>
                    <div class="item-content">${escapeHtml(item.content)}</div>
                </div>
            `
          )
          .join('')
      }

      // 转义 HTML
      function escapeHtml(text) {
        const div = document.createElement('div')
        div.textContent = text
        return div.innerHTML
      }

      // 添加记录
      function add() {
        const content = input.value.trim()
        if (!content) return

        const items = loadItems()
        items.unshift({
          content: content,
          time: Date.now()
        })
        saveItems(items)

        input.value = ''
        render()
      }

      // 删除记录
      function deleteItem(index) {
        const items = loadItems()
        items.splice(index, 1)
        saveItems(items)
        render()
      }

      // 事件绑定
      submitBtn.addEventListener('click', add)

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
          e.preventDefault()
          add()
        }
      })

      // 初始渲染
      render()
    </script>
  </body>
</html>
